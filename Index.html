<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Point - Ingreso</title>
    <style>
        /* Fondo con colores cálidos que abren el apetito */
        body {
            background-color: #ffecd2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Contenedor del formulario */
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 320px;
            border-top: 6px solid #ff4500; /* Naranja rojizo */
        }

        .login-container h2 {
            color: #d32f2f; /* Rojo intenso */
            margin-bottom: 5px;
        }

        .login-container p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Estilos de los campos de texto */
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            border-color: #ff9800;
            outline: none;
        }

        /* Botón llamativo */
        button {
            width: 100%;
            padding: 14px;
            background-color: #ff9800; /* Color pan de hamburguesa/cheddar */
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 15px;
        }

        button:hover {
            background-color: #e65100;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>🍔 ¡Pedí tu Burger!</h2>
        <p>Completá tus datos para el envío</p>
        
        <form id="burgerLoginForm">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="text" id="apellido" placeholder="Apellido" required>
            <input type="text" id="direccion" placeholder="Dirección de entrega" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            
            <button type="submit">Entrar y Ver Menú</button>
        </form>
    </div>

</body>
</html>
