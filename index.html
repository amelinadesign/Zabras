<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Point - ¡Pecado Original!</title>
    <style>
        /* Estilos base con colores que despiertan el hambre */
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.96);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 380px;
            text-align: center;
            border: 4px solid #ffcc00; /* Color queso fundido */
        }

        /* Texto de Bienvenida */
        .welcome-section h1 {
            color: #d32f2f;
            margin: 0;
            font-size: 28px;
            text-transform: uppercase;
        }

        .welcome-section p {
            color: #333;
            font-size: 16px;
            font-weight: bold;
            margin: 10px 0 20px 0;
        }

        /* Badge de oferta */
        .promo-badge {
            background-color: #d32f2f;
            color: white;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Formulario */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        input:focus {
            border-color: #ff9800;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px #e65100;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:active {
            box-shadow: 0 0 #e65100;
            transform: translateY(4px);
        }

        .footer-text {
            color: #777;
            font-size: 11px;
            margin-top: 15px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="welcome-section">
            <div class="promo-badge">🔥 ¡OFERTAS DE HOY DESDE $3.500! 🔥</div>
            <h1>¡BIENVENIDO A BURGER POINT!</h1>
            <p>Donde el sabor es gigante y el precio es chiquito. 🍔✨</p>
        </div>

        <form id="loginForm">
            <input type="text" placeholder="Tu Nombre y Apellido" required>
            <input type="text" placeholder="Dirección para el delivery" required>
            <input type="password" placeholder="Elegí una contraseña" required>
            
            <button type="submit">¡QUIERO MI BURGER YA!</button>
        </form>

        <p class="footer-text">Las hamburguesas más baratas y ricas de la zona. Garantizado.</p>
    </div>

</body>
</html>
